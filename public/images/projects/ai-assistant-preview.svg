  <text x="132" y="266" fill="#a1a1aa" font-family="Inter, Arial" font-size="22">Wake phrase / speech recognition / text-to-speech / local actions</text>
  <rect x="132" y="334" width="420" height="184" rx="24" fill="#0a0a0a" stroke="#27272a"/>
  <text x="168" y="386" fill="#86efac" font-family="JetBrains Mono, monospace" font-size="22">hey jarvis open spotify</text>
