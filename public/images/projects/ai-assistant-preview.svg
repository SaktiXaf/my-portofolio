<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="AI assistant with voice preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset=".56" stop-color="#111827"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" x2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset=".5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity=".06"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
